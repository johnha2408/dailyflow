<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --muted2: #3a3a52;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed;
    top:-200px; left:-200px;
    width:600px; height:600px;
    background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:'';
    position:fixed;
    bottom:-200px; right:-200px;
    width:500px; height:500px;
    background: radial-gradient(circle, rgba(255,101,132,0.06) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  /* LAYOUT */
  .app { display:flex; min-height:100vh; position:relative; z-index:1; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
    overflow-y:auto;
    flex-shrink:0;
  }
  .logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo h1 {
    font-family:'Syne',sans-serif;
    font-size:18px; font-weight:800;
    letter-spacing:-0.5px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .logo .date {
    font-size:11px; color:var(--muted);
    margin-top:4px; font-weight:300;
    letter-spacing:0.5px;
  }
  .sidebar-section { padding:16px 12px 8px; }
  .sidebar-section-label {
    font-size:9px; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted);
    font-weight:600; padding: 0 8px;
    margin-bottom:6px;
  }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:8px;
    cursor:pointer; font-size:13px; font-weight:400;
    color:var(--muted); transition: all 0.15s;
    user-select:none;
  }
  .nav-item:hover { background:var(--card); color:var(--text); }
  .nav-item.active { background: rgba(108,99,255,0.15); color: var(--accent); }
  .nav-item .ico { width:16px; height:16px; flex-shrink:0; opacity:0.7; }
  .nav-item.active .ico { opacity:1; }
  .nav-badge {
    margin-left:auto; background:var(--accent);
    color:#fff; font-size:10px; font-weight:600;
    padding:1px 6px; border-radius:99px;
  }
  .project-dot {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
  }

  /* MAIN */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  /* TOPBAR */
  .topbar {
    padding:20px 28px 16px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:16px;
    background: var(--bg);
    position:sticky; top:0; z-index:10;
  }
  .topbar h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; flex:1; }
  .topbar-actions { display:flex; gap:8px; }
  .btn {
    padding:8px 16px; border-radius:8px;
    border:none; cursor:pointer; font-size:12px;
    font-family:'DM Sans',sans-serif; font-weight:500;
    transition:all 0.15s; display:flex; align-items:center; gap:6px;
  }
  .btn-primary {
    background: var(--accent); color:#fff;
  }
  .btn-primary:hover { background:#7c74ff; transform:translateY(-1px); }
  .btn-ghost {
    background: var(--card); color:var(--muted); border:1px solid var(--border);
  }
  .btn-ghost:hover { color:var(--text); border-color:var(--muted2); }

  /* CONTENT */
  .content { flex:1; overflow-y:auto; padding:24px 28px; }

  /* STATS ROW */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:16px;
    transition:transform 0.15s;
  }
  .stat-card:hover { transform:translateY(-2px); }
  .stat-label { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; font-weight:500; }
  .stat-value { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin:6px 0 4px; }
  .stat-sub { font-size:11px; color:var(--muted); }
  .c-purple { color:var(--accent); }
  .c-pink   { color:var(--accent2); }
  .c-green  { color:var(--accent3); }
  .c-orange { color:var(--accent4); }

  /* PROGRESS BAR */
  .progress-wrap { background:var(--border); border-radius:99px; height:4px; margin-top:8px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:99px; transition:width 0.5s ease; }

  /* SECTIONS GRID */
  .sections-grid { display:grid; grid-template-columns:1fr 320px; gap:20px; }

  /* TASK LIST */
  .panel {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; overflow:hidden;
  }
  .panel-head {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .panel-head h3 { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; flex:1; }
  .panel-tag {
    font-size:10px; padding:3px 8px; border-radius:99px;
    font-weight:600; letter-spacing:0.5px;
  }
  .tag-purple { background:rgba(108,99,255,0.15); color:var(--accent); }
  .tag-pink   { background:rgba(255,101,132,0.15); color:var(--accent2); }
  .tag-green  { background:rgba(67,233,123,0.15); color:var(--accent3); }
  .tag-orange { background:rgba(247,151,30,0.15); color:var(--accent4); }

  /* ADD TASK */
  .add-task-form {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:flex; gap:8px; align-items:center;
  }
  .add-task-input {
    flex:1; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:8px 12px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:13px;
    outline:none; transition:border-color 0.15s;
  }
  .add-task-input::placeholder { color:var(--muted); }
  .add-task-input:focus { border-color:var(--accent); }
  .add-task-select {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; color:var(--muted);
    font-family:'DM Sans',sans-serif; font-size:12px;
    outline:none; cursor:pointer;
  }
  .btn-add {
    background:var(--accent); color:#fff; border:none;
    border-radius:8px; padding:8px 14px; cursor:pointer;
    font-size:18px; font-weight:300; transition:background 0.15s;
    display:flex; align-items:center; justify-content:center;
  }
  .btn-add:hover { background:#7c74ff; }

  /* TASK ITEM */
  .task-group-label {
    padding:10px 16px 4px;
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }
  .task-item {
    padding:12px 16px; display:flex; align-items:flex-start; gap:12px;
    border-bottom:1px solid rgba(30,30,46,0.5);
    transition:background 0.1s; cursor:default;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
  .task-item:hover { background:rgba(255,255,255,0.02); }
  .task-item:last-child { border-bottom:none; }
  .task-check {
    width:18px; height:18px; border-radius:5px;
    border:1.5px solid var(--muted2); flex-shrink:0;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s; margin-top:1px;
  }
  .task-check:hover { border-color:var(--accent); }
  .task-check.done { background:var(--accent3); border-color:var(--accent3); }
  .task-check.done::after { content:'✓'; font-size:11px; color:#0a0a0f; font-weight:700; }
  .task-body { flex:1; min-width:0; }
  .task-title {
    font-size:13px; font-weight:400; color:var(--text);
    transition:color 0.15s; line-height:1.4;
  }
  .task-item.completed .task-title { text-decoration:line-through; color:var(--muted); }
  .task-meta { display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
  .task-project {
    font-size:10px; padding:2px 7px; border-radius:99px;
    font-weight:500;
  }
  .task-time { font-size:10px; color:var(--muted); }
  .task-priority {
    width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:5px;
  }
  .p-high { background:var(--accent2); }
  .p-med  { background:var(--accent4); }
  .p-low  { background:var(--accent3); }
  .task-del {
    opacity:0; background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:14px; padding:2px 4px;
    transition:opacity 0.15s, color 0.15s;
    margin-left:auto; flex-shrink:0;
  }
  .task-item:hover .task-del { opacity:1; }
  .task-del:hover { color:var(--accent2); }

  /* EMPTY */
  .empty-state {
    padding:32px 16px; text-align:center;
    color:var(--muted); font-size:12px;
  }
  .empty-state .e-icon { font-size:28px; margin-bottom:8px; }

  /* RIGHT COLUMN */
  .right-col { display:flex; flex-direction:column; gap:16px; }

  /* ROUTINE PANEL */
  .routine-item {
    padding:10px 16px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(30,30,46,0.5);
    transition:background 0.1s;
  }
  .routine-item:last-child { border-bottom:none; }
  .routine-item:hover { background:rgba(255,255,255,0.02); }
  .routine-time { font-size:11px; color:var(--muted); width:44px; flex-shrink:0; font-variant-numeric:tabular-nums; }
  .routine-label { font-size:13px; flex:1; }
  .routine-check { cursor:pointer; font-size:16px; transition:transform 0.15s; }
  .routine-check:hover { transform:scale(1.2); }

  /* NOTES */
  .notes-area {
    width:100%; background:transparent; border:none;
    color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:13px; line-height:1.7; padding:14px 16px;
    resize:none; outline:none; min-height:130px;
  }
  .notes-area::placeholder { color:var(--muted); }

  /* FOCUS MODE overlay */
  .focus-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:100;
    align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  .focus-overlay.open { display:flex; }
  .focus-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:40px; width:420px;
    text-align:center;
  }
  .focus-card h2 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:8px; }
  .focus-card .task-name { color:var(--muted); font-size:15px; margin-bottom:32px; }
  .timer { font-family:'Syne',sans-serif; font-size:56px; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:24px; letter-spacing:-2px; }
  .focus-actions { display:flex; gap:10px; justify-content:center; }

  /* FILTER TABS */
  .filter-tabs { display:flex; gap:4px; padding:12px 16px 8px; }
  .filter-tab {
    padding:5px 12px; border-radius:99px; font-size:11px; font-weight:500;
    cursor:pointer; transition:all 0.15s; color:var(--muted);
    border:1px solid transparent;
  }
  .filter-tab.active { background:rgba(108,99,255,0.15); color:var(--accent); border-color:rgba(108,99,255,0.3); }
  .filter-tab:hover:not(.active) { color:var(--text); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--muted2); border-radius:2px; }

  /* MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.7); z-index:100;
    align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:28px; width:400px;
  }
  .modal h3 { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:16px; }
  .form-row { margin-bottom:12px; }
  .form-label { font-size:11px; color:var(--muted); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:5px; display:block; }
  .form-input {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:9px 12px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:13px; outline:none;
    transition:border-color 0.15s;
  }
  .form-input:focus { border-color:var(--accent); }
  .form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

  @media(max-width:900px) {
    .sections-grid { grid-template-columns:1fr; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .sidebar { width:220px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <h1>⚡ DailyFlow</h1>
      <div class="date" id="sidebarDate"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Tổng quan</div>
      <div class="nav-item active" onclick="setView('today')">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Hôm nay
        <span class="nav-badge" id="todayBadge">0</span>
      </div>
      <div class="nav-item" onclick="setView('all')">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
        Tất cả Tasks
      </div>
      <div class="nav-item" onclick="setView('routine')">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Quy trình hàng ngày
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Dự án</div>
      <div id="projectNavList"></div>
      <div class="nav-item" onclick="openProjectModal()">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Thêm dự án
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <h2 id="viewTitle">Hôm nay</h2>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="openFocusMode()">🎯 Focus Mode</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ Thêm task</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="mainContent">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>➕ Thêm task mới</h3>
    <div class="form-row">
      <label class="form-label">Tên task</label>
      <input class="form-input" id="newTaskTitle" placeholder="Nhập tên công việc..." />
    </div>
    <div class="form-row">
      <label class="form-label">Dự án</label>
      <select class="form-input" id="newTaskProject"></select>
    </div>
    <div class="form-row">
      <label class="form-label">Ưu tiên</label>
      <select class="form-input" id="newTaskPriority">
        <option value="high">🔴 Cao</option>
        <option value="med" selected>🟠 Trung bình</option>
        <option value="low">🟢 Thấp</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Thời gian (tuỳ chọn)</label>
      <input class="form-input" id="newTaskTime" placeholder="VD: 9:00 - 10:00" />
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="submitTask()">Thêm task</button>
    </div>
  </div>
</div>

<!-- ADD PROJECT MODAL -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h3>📁 Thêm dự án</h3>
    <div class="form-row">
      <label class="form-label">Tên dự án</label>
      <input class="form-input" id="newProjectName" placeholder="VD: Omega2000 SEO..." />
    </div>
    <div class="form-row">
      <label class="form-label">Màu</label>
      <select class="form-input" id="newProjectColor">
        <option value="#6c63ff">🟣 Tím</option>
        <option value="#ff6584">🔴 Hồng</option>
        <option value="#43e97b">🟢 Xanh lá</option>
        <option value="#f7971e">🟠 Cam</option>
        <option value="#38b2f0">🔵 Xanh dương</option>
        <option value="#ff9a9e">🌸 Hồng nhạt</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeProjectModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="submitProject()">Tạo dự án</button>
    </div>
  </div>
</div>

<!-- FOCUS MODE OVERLAY -->
<div class="focus-overlay" id="focusOverlay">
  <div class="focus-card">
    <h2>🎯 Focus Mode</h2>
    <div class="task-name" id="focusTaskName">Chọn task để tập trung</div>
    <div class="timer" id="timerDisplay">25:00</div>
    <div class="focus-actions">
      <button class="btn btn-primary" id="timerBtn" onclick="toggleTimer()">▶ Bắt đầu</button>
      <button class="btn btn-ghost" onclick="resetTimer()">↺ Reset</button>
      <button class="btn btn-ghost" onclick="closeFocus()">✕ Đóng</button>
    </div>
  </div>
</div>

<script>
// ============ STATE ============
const STORAGE_KEY = 'dailyflow_v2';

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return null;
}

function defaultState() {
  return {

      { id:t(), title:'Publish blog post Omega Ready Mix', project:'omega', priority:'high', time:'10:00 - 11:00', done:true, date:today() },

      { id:'r2', time:'7:00', label:'Kiểm tra email + Slack / Telegram', done:false },
      { id:'r3', time:'8:00', label:'Review Google Search Console & GA4', done:false },
      { id:'r4', time:'9:00', label:'Daily standup team SEO (Vy, Nam, Thắng)', done:false },
      { id:'r5', time:'12:00', label:'Kiểm tra Google Ads campaigns', done:false },

      { id:'r8', time:'21:00', label:'Xem lại trades trong ngày + update journal', done:false },
    ],
    notes: '',
  };
}

function t() { return Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0,10); }

let state = loadState() || defaultState();
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ============ VIEW ============
let currentView = 'today';
let currentFilter = 'all';

function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  render();
}

function render() {
  updateSidebarDate();
  renderProjectNav();
  updateBadge();
  const c = document.getElementById('mainContent');
  const titles = { today:'Hôm nay', all:'Tất cả Tasks', routine:'Quy trình hàng ngày' };
  document.getElementById('viewTitle').textContent =
    state.projects.find(p=>p.id===currentView)?.name || titles[currentView] || 'Tasks';

  if (currentView === 'routine') { c.innerHTML = renderRoutineView(); bindRoutine(); }
  else { c.innerHTML = renderTaskView(); bindTasks(); }
}

function updateSidebarDate() {
  const d = new Date();
  document.getElementById('sidebarDate').textContent =
    d.toLocaleDateString('vi-VN', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

function renderProjectNav() {
  const el = document.getElementById('projectNavList');
  el.innerHTML = state.projects.map(p => `
    <div class="nav-item ${currentView===p.id?'active':''}" onclick="setView('${p.id}')">
      <div class="project-dot" style="background:${p.color}"></div>
      ${p.name}
    </div>
  `).join('');
}

function updateBadge() {
  const rem = state.tasks.filter(t => t.date===today() && !t.done).length;
  document.getElementById('todayBadge').textContent = rem;
}

// ============ TASK VIEW ============
function renderTaskView() {
  let tasks = [...state.tasks];
  if (currentView === 'today') tasks = tasks.filter(t => t.date === today());
  else if (currentView !== 'all') tasks = tasks.filter(t => t.project === currentView);

  const fil = currentFilter;
  if (fil === 'done') tasks = tasks.filter(t => t.done);
  else if (fil === 'todo') tasks = tasks.filter(t => !t.done);
  else if (fil === 'high') tasks = tasks.filter(t => t.priority === 'high');

  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const pct   = total ? Math.round(done/total*100) : 0;

  const projectOptions = state.projects.map(p =>
    `<option value="${p.id}">${p.name}</option>`
  ).join('');

  const grouped = {};
  tasks.forEach(t => {
    const g = t.project || 'personal';
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(t);
  });

  let taskHTML = '';
  if (tasks.length === 0) {
    taskHTML = `<div class="empty-state"><div class="e-icon">✨</div>Không có task nào. Hãy thêm task mới!</div>`;
  } else {
    if (currentView === 'today' || currentView === 'all') {
      Object.keys(grouped).forEach(gid => {
        const proj = state.projects.find(p=>p.id===gid);
        taskHTML += `<div class="task-group-label">${proj?.name||gid}</div>`;
        taskHTML += grouped[gid].map(t => renderTaskItem(t)).join('');
      });
    } else {
      taskHTML = tasks.map(t => renderTaskItem(t)).join('');
    }
  }

  return `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Tổng tasks</div>
        <div class="stat-value c-purple">${total}</div>
        <div class="stat-sub">${currentView==='today'?'hôm nay':'hiển thị'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Hoàn thành</div>
        <div class="stat-value c-green">${done}</div>
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:var(--accent3)"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Còn lại</div>
        <div class="stat-value c-pink">${total - done}</div>
        <div class="stat-sub">cần hoàn thành</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tiến độ</div>
        <div class="stat-value c-orange">${pct}%</div>
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:var(--accent4)"></div></div>
      </div>
    </div>
    <div class="sections-grid">
      <div>
        <div class="panel">
          <div class="panel-head">
            <h3>📋 Danh sách công việc</h3>
            <span class="panel-tag tag-purple">${total} tasks</span>
          </div>
          <div class="add-task-form">
            <input class="add-task-input" id="quickInput" placeholder="Thêm task nhanh... (Enter để lưu)" onkeydown="if(event.key==='Enter')quickAdd()" />
            <select class="add-task-select" id="quickProject">${projectOptions}</select>
            <button class="btn-add" onclick="quickAdd()">+</button>
          </div>
          <div class="filter-tabs">
            ${['all','todo','done','high'].map(f=>`
              <div class="filter-tab ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">
                ${{all:'Tất cả',todo:'Cần làm',done:'Xong',high:'Ưu tiên cao'}[f]}
              </div>
            `).join('')}
          </div>
          <div id="taskList">${taskHTML}</div>
        </div>
      </div>
      <div class="right-col">
        <div class="panel">
          <div class="panel-head">
            <h3>🕐 Routine hôm nay</h3>
            <span class="panel-tag tag-green">${state.routines.filter(r=>r.done).length}/${state.routines.length}</span>
          </div>
          ${state.routines.slice(0,5).map(r => `
            <div class="routine-item">
              <span class="routine-time">${r.time}</span>
              <span class="routine-label" style="${r.done?'text-decoration:line-through;color:var(--muted)':''}">${r.label}</span>
              <span class="routine-check" onclick="toggleRoutine('${r.id}')">${r.done?'✅':'⬜'}</span>
            </div>
          `).join('')}
          <div style="padding:8px 16px">
            <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:12px" onclick="setView('routine')">Xem toàn bộ →</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>📝 Ghi chú nhanh</h3></div>
          <textarea class="notes-area" id="notesArea" placeholder="Ghi chú, ý tưởng, reminder..." onInput="saveNotes()">${state.notes}</textarea>
        </div>
      </div>
    </div>
  `;
}

function renderTaskItem(t) {
  const proj = state.projects.find(p=>p.id===t.project);
  const pLabels = { high:'Cao', med:'TB', low:'Thấp' };
  return `
    <div class="task-item ${t.done?'completed':''}" id="task_${t.id}">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')"></div>
      <div class="task-priority p-${t.priority}"></div>
      <div class="task-body">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          ${proj?`<span class="task-project" style="background:${proj.color}22;color:${proj.color}">${proj.name}</span>`:''}
          ${t.time?`<span class="task-time">⏰ ${t.time}</span>`:''}
        </div>
      </div>
      <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
    </div>
  `;
}

// ============ ROUTINE VIEW ============
function renderRoutineView() {
  const done = state.routines.filter(r=>r.done).length;
  const pct = Math.round(done/state.routines.length*100);
  return `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Tổng bước</div>
        <div class="stat-value c-purple">${state.routines.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Hoàn thành</div>
        <div class="stat-value c-green">${done}</div>
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:var(--accent3)"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Còn lại</div>
        <div class="stat-value c-pink">${state.routines.length-done}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tiến độ</div>
        <div class="stat-value c-orange">${pct}%</div>
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:var(--accent4)"></div></div>
      </div>
    </div>
    <div class="panel" style="max-width:680px">
      <div class="panel-head">
        <h3>🔄 Quy trình hàng ngày</h3>
        <span class="panel-tag tag-purple">${done}/${state.routines.length} xong</span>
        <button class="btn btn-ghost" onclick="resetRoutine()" style="margin-left:auto">↺ Reset ngày mới</button>
      </div>
      <div id="routineFullList">
        ${state.routines.map(r => `
          <div class="routine-item" id="routine_${r.id}">
            <span class="routine-time">${r.time}</span>
            <span class="routine-label" style="${r.done?'text-decoration:line-through;color:var(--muted)':''}">${r.label}</span>
            <span class="routine-check" onclick="toggleRoutine('${r.id}')">${r.done?'✅':'⬜'}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ============ ACTIONS ============
function bindTasks() {
  document.getElementById('notesArea')?.addEventListener('input', saveNotes);
}
function bindRoutine() {}

function toggleTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (t) { t.done = !t.done; save(); render(); }
}
function deleteTask(id) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  save(); render();
}
function toggleRoutine(id) {
  const r = state.routines.find(r=>r.id===id);
  if (r) { r.done = !r.done; save(); render(); }
}
function resetRoutine() {
  state.routines.forEach(r=>r.done=false);
  save(); render();
}
function saveNotes() {
  state.notes = document.getElementById('notesArea')?.value || '';
  save();
}
function setFilter(f) {
  currentFilter = f;
  render();
}

function quickAdd() {
  const inp = document.getElementById('quickInput');
  const proj = document.getElementById('quickProject');
  if (!inp.value.trim()) return;
  state.tasks.push({
    id: t(), title: inp.value.trim(),
    project: proj?.value || 'personal',
    priority: 'med', time: '', done: false, date: today()
  });
  inp.value = '';
  save(); render();
}

// Modal add task
function openAddModal() {
  const sel = document.getElementById('newTaskProject');
  sel.innerHTML = state.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('addModal').classList.add('open');
  document.getElementById('newTaskTitle').focus();
}
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }
function submitTask() {
  const title = document.getElementById('newTaskTitle').value.trim();
  if (!title) return;
  state.tasks.push({
    id:t(), title,
    project: document.getElementById('newTaskProject').value,
    priority: document.getElementById('newTaskPriority').value,
    time: document.getElementById('newTaskTime').value,
    done:false, date:today()
  });
  document.getElementById('newTaskTitle').value='';
  document.getElementById('newTaskTime').value='';
  save(); closeAddModal(); render();
}

// Modal project
function openProjectModal() { document.getElementById('projectModal').classList.add('open'); }
function closeProjectModal() { document.getElementById('projectModal').classList.remove('open'); }
function submitProject() {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) return;
  state.projects.push({ id:t(), name, color: document.getElementById('newProjectColor').value });
  document.getElementById('newProjectName').value='';
  save(); closeProjectModal(); render();
}

// Close modals on bg click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
});

// ============ FOCUS / TIMER ============
let timerInterval = null;
let timerSeconds = 25*60;
let timerRunning = false;

function openFocusMode() {
  const nextTask = state.tasks.find(t=>t.date===today()&&!t.done);
  document.getElementById('focusTaskName').textContent = nextTask ? nextTask.title : 'Không có task pending hôm nay';
  document.getElementById('focusOverlay').classList.add('open');
}
function closeFocus() {
  clearInterval(timerInterval); timerRunning=false; timerSeconds=25*60;
  document.getElementById('timerDisplay').textContent='25:00';
  document.getElementById('timerBtn').textContent='▶ Bắt đầu';
  document.getElementById('focusOverlay').classList.remove('open');
}
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning=false;
    document.getElementById('timerBtn').textContent='▶ Tiếp tục';
  } else {
    timerRunning=true;
    document.getElementById('timerBtn').textContent='⏸ Tạm dừng';
    timerInterval = setInterval(()=>{
      timerSeconds--;
      if (timerSeconds<=0) { clearInterval(timerInterval); timerRunning=false; timerSeconds=0; }
      const m=Math.floor(timerSeconds/60), s=timerSeconds%60;
      document.getElementById('timerDisplay').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
  }
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning=false; timerSeconds=25*60;
  document.getElementById('timerDisplay').textContent='25:00';
  document.getElementById('timerBtn').textContent='▶ Bắt đầu';
}

// ============ INIT ============
updateSidebarDate();
render();
</script>
</body>
</html>
